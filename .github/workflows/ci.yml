name: Network Automation CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jinja2 junos-eznc lxml ncclient

      - name: Validate YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('inventory/device.yaml'))"

      - name: Generate Junos configs
        run: |
          cd scripts
          python generate_config.py

      - name: Show generated configs
        run: |
          ls -l configs

      - name: Upload generated configs
        uses: actions/upload-artifact@v4
        with:
          name: junos-configs
          path: configs/
      - name: Test remote PyEZ connectivity
        env:
          JUNOS_HOST: ${{ secrets.JUNOS_HOST }}
          JUNOS_PORT: ${{ secrets.JUNOS_PORT }}
          JUNOS_USER: ${{ secrets.JUNOS_USER }}
          JUNOS_PASSWORD: ${{ secrets.JUNOS_PASSWORD }}
        run: |
          python scripts/remote_test.py
